services:
  monmon:
    # Use pre-built image from Docker Hub (recommended):
    image: 0xnayel/monmon:latest
    # Or build from source (uncomment below, comment out image above):
    # build: .
    container_name: monmon
    ports:
      - "8888:8888"
    volumes:
      - monmon-data:/var/lib/monmon/data
      - ./configs:/etc/monmon
    environment:
      - MONMON_SERVER_PORT=8888
      - MONMON_LOGGING_LEVEL=info
      - MONMON_ADMIN_USER=${MONMON_ADMIN_USER:?Create a .env file with MONMON_ADMIN_USER=youruser}
      - MONMON_ADMIN_PASSWORD=${MONMON_ADMIN_PASSWORD:?Create a .env file with MONMON_ADMIN_PASSWORD=yourpassword}
    restart: unless-stopped

volumes:
  monmon-data:
